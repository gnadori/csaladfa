<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mendeli öröklődés - Rozsomák tanár úr</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Roboto+Slab:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-tajga-ho: #F8F9FA;
            --text-medvebarna: #2D2A26;
            --accent-borostyan: #D97725;
            --accent-fenyo: #2C5E4B;
            --surface-karty: #FFFFFF;
            
            --hard-shadow: 4px 4px 0px #2D2A26;
            --hard-shadow-hover: 2px 2px 0px #2D2A26;
            --border-thick: 3px solid #2D2A26;
            --border-radius: 0px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-tajga-ho);
            color: var(--text-medvebarna);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
        }

        h1, h2, h3 {
            font-family: 'Roboto Slab', serif;
            color: var(--text-medvebarna);
            font-weight: 700;
        }

        .site-header {
            border-bottom: var(--border-thick);
            background-color: var(--bg-tajga-ho);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .site-header .logo {
            font-family: 'Roboto Slab', serif;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .main-container {
            max-width: 800px;
            margin: 3rem auto;
            padding: 0 2rem;
            width: 100%;
            flex-grow: 1;
        }

        .task-card {
            background: var(--surface-karty);
            border: var(--border-thick);
            box-shadow: var(--hard-shadow);
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .task-title {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--text-medvebarna);
            padding-bottom: 0.5rem;
            display: inline-block;
        }

        .task-text {
            font-size: 1.15rem;
            margin-bottom: 2rem;
            font-weight: 600;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        label.radio-label {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 0.5rem;
            border: 2px solid transparent;
            transition: border 0.2s;
        }
        
        label.radio-label:hover {
            border: 2px dashed #ccc;
        }

        input[type="radio"] {
            appearance: none;
            width: 24px;
            height: 24px;
            border: 2px solid var(--text-medvebarna);
            background: var(--surface-karty);
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
        }

        input[type="radio"]:checked {
            background-color: var(--accent-borostyan);
            border-color: var(--text-medvebarna);
        }
        
        input[type="radio"]:checked::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 10px; height: 10px;
            background: var(--text-medvebarna);
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        button {
            padding: 1rem 2rem;
            border: var(--border-thick);
            background: var(--surface-karty);
            color: var(--text-medvebarna);
            font-size: 1.1rem;
            font-weight: 800;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            box-shadow: var(--hard-shadow);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button:active {
            transform: translate(2px, 2px);
            box-shadow: var(--hard-shadow-hover);
        }

        .primary-btn {
            background-color: var(--accent-borostyan);
        }

        .feedback {
            padding: 1.5rem;
            border: var(--border-thick);
            margin-top: 2rem;
            font-size: 1.1rem;
            box-shadow: var(--hard-shadow);
            display: none;
        }

        .feedback.success {
            background-color: #E8F5E9;
            border-color: var(--accent-fenyo);
            display: block;
        }

        .feedback.error {
            background-color: #FFF3E0;
            border-color: var(--accent-borostyan);
            display: block;
        }

        .explanation {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(0,0,0,0.2);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
        }

        .site-footer {
            background-color: var(--text-medvebarna);
            color: var(--bg-tajga-ho);
            text-align: center;
            padding: 1.5rem;
            margin-top: 3rem;
            font-size: 0.9rem;
        }
        
        .genotype {
            font-family: 'Inter', monospace;
            font-weight: 800;
            letter-spacing: 1px;
            background: #eee;
            padding: 0 4px;
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="logo">Rozsomák tanár úr</div>
        <div>Mendeli öröklődés gyakorló (Haladó)</div>
    </header>

    <main class="main-container">
        <div class="task-card">
            <h2 class="task-title" id="taskTitle">Feladat betöltése...</h2>
            <p class="task-text" id="taskText"></p>

            <div id="optionsContainer" class="radio-group">
                </div>

            <div class="controls">
                <button id="checkBtn" class="primary-btn">Ellenőrzés</button>
                <button id="nextBtn">Új feladat</button>
            </div>

            <div id="feedbackBox" class="feedback"></div>
        </div>
    </main>

    <footer class="site-footer">
        <p>Készítette: Rozsomák tanár úr | Klasszikus genetika modul</p>
    </footer>

    <script>
        const organisms = [
            { name: "kardszárnyú delfin", traits: [ { trait: "hátúszó alakja", dom: "egyenes", rec: "hajlott", inter: "enyhén ívelt" }, { trait: "szemfolt mérete", dom: "nagy", rec: "kicsi", inter: "közepes" }, { trait: "hasi folt színe", dom: "hófehér", rec: "sárgás", inter: "törtfehér" }, { trait: "testhossz", dom: "hosszú", rec: "rövid", inter: "átlagos" }, { trait: "farokúszó szélessége", dom: "széles", rec: "keskeny", inter: "közepes" } ] },
            { name: "pampanyúl", traits: [ { trait: "fülek hossza", dom: "hosszú", rec: "rövid", inter: "félhosszú" }, { trait: "szőrzet színe", dom: "vadasbarna", rec: "szürke", inter: "fakóbarna" }, { trait: "lábak hossza", dom: "hosszú", rec: "rövid", inter: "közepes" }, { trait: "bajuszszálak vastagsága", dom: "vastag", rec: "vékony", inter: "normál" }, { trait: "farok mérete", dom: "hosszú", rec: "csonka", inter: "félhosszú" } ] },
            { name: "ecetmuslica", traits: [ { trait: "szemszín", dom: "piros", rec: "fehér", inter: "rózsaszín" }, { trait: "szárny alakja", dom: "normál", rec: "csökevényes", inter: "féloldalas" }, { trait: "testszín", dom: "világosbarna", rec: "ébenfekete", inter: "sötétbarna" }, { trait: "sörték hossza", dom: "hosszú", rec: "rövid", inter: "közepes" }, { trait: "tor mintázata", dom: "sima", rec: "csíkos", inter: "halványan csíkos" } ] },
            { name: "sárgarépa", traits: [ { trait: "gyökér színe", dom: "narancs", rec: "sárga", inter: "halványnarancs" }, { trait: "gyökér alakja", dom: "hengeres", rec: "kúpos", inter: "félkúpos" }, { trait: "levélzet sűrűsége", dom: "sűrű", rec: "ritka", inter: "közepes" }, { trait: "cukortartalom", dom: "magas", rec: "alacsony", inter: "közepes" }, { trait: "szárhossz", dom: "hosszú", rec: "rövid", inter: "félhosszú" } ] },
            { name: "halvány geze", traits: [ { trait: "tollazat mintázata", dom: "csíkos", rec: "pöttyös", inter: "foltos" }, { trait: "szárnyfesztáv", dom: "széles", rec: "keskeny", inter: "közepes" }, { trait: "csőr hossza", dom: "hosszú", rec: "rövid", inter: "félhosszú" }, { trait: "ének hangmagassága", dom: "magas", rec: "mély", inter: "közepes" }, { trait: "lábujjak hossza", dom: "hosszú", rec: "rövid", inter: "normál" } ] }
        ];

        let currentTask = null;

        function randInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // --- A TÍPUSÚ FELADATOK (Öröklődés menete) ---
        function generateTaskA(org, traitObj) {
            let task = { type: 'A' };
            let tA = traitObj.dom; let tB = traitObj.rec;
            if (Math.random() > 0.5) { tA = traitObj.rec; tB = traitObj.dom; }
            let tInter = traitObj.inter;

            let mode = randInt(0, 3); // 4 altípus
            let total = randInt(100, 300);

            if (mode === 0) { // 3:1 Dom/Rec
                let countA = Math.round(total * 0.75) + randInt(-3, 3);
                let countB = total - countA;
                task.text = `Két <strong>${tA}</strong> ${traitObj.trait}ú ${org.name} egyedet kereszteztek. Az utódok között <strong>${countA} db ${tA}</strong> és <strong>${countB} db ${tB}</strong> fenotípusú lett.<br><br>Hogyan öröklődik a tulajdonság?`;
                task.expectedId = "domA";
                task.explanation = `A 3:1 arány (${countA}:${countB}) klasszikus domináns-recesszív hasadás két heterozigóta szülő esetén. A nagyobb arányban megjelenő jelleg (${tA}) a domináns.`;
            } else if (mode === 1) { // 100% Uniformitás (Mendel I)
                task.text = `Kereszteztek egy tiszta vérvonalú (homozigóta) <strong>${tA}</strong> és egy tiszta vérvonalú <strong>${tB}</strong> ${traitObj.trait}ú egyedet. Az első utódnemzedék <strong>100%-a ${tB}</strong> fenotípusú lett.<br><br>Hogyan öröklődik a tulajdonság?`;
                task.expectedId = "domB";
                task.explanation = `Mendel I. (uniformitás) törvénye alapján, ha két különböző tiszta vérvonalat keresztezünk, az F1 nemzedék az egyik szülő fenotípusát veszi fel 100%-ban. Ez a jelleg (${tB}) a domináns.`;
            } else if (mode === 2) { // 1:2:1 Intermedier
                let cA = Math.round(total * 0.25) + randInt(-2, 2);
                let cB = Math.round(total * 0.25) + randInt(-2, 2);
                let cI = total - cA - cB;
                task.text = `Két <strong>${tInter}</strong> ${traitObj.trait}ú ${org.name} keresztezéséből: <strong>${cA} db ${tA}</strong>, <strong>${cI} db ${tInter}</strong> és <strong>${cB} db ${tB}</strong> egyed született.<br><br>Hogyan öröklődik a tulajdonság?`;
                task.expectedId = "inter";
                task.explanation = `Az arány nagyjából 1:2:1. Egy harmadik, átmeneti fenotípus (${tInter}) jelenik meg a legnagyobb számban heterozigóták keresztezésénél, ami a hiányos dominancia (intermedier öröklődés) bizonyítéka.`;
            } else { // 2:1 Letális allél
                let domCount = Math.round(total * 0.66) + randInt(-2, 2);
                let recCount = total - domCount;
                task.text = `Két <strong>${tA}</strong> ${traitObj.trait}ú ${org.name} egyed keresztezésekor feltűnően kevesebb utód született a vártnál. A megszületett utódok közül <strong>${domCount} db ${tA}</strong> és <strong>${recCount} db ${tB}</strong> fenotípusú volt.<br><br>Mire következtetsz az öröklődés menetéből?`;
                task.expectedId = "lethal";
                task.explanation = `Az arány 2:1 (${domCount}:${recCount}). Ez akkor fordul elő, ha a domináns homozigóta (AA) genotípus letális (életképtelen) és elpusztul még születés előtt. Csak a heterozigóták (Aa) adják a domináns fenotípust, és a recesszívek (aa) a recesszívet.`;
            }

            task.options = [
                { id: "domA", label: `A(z) ${tA} domináns a(z) ${tB} felett.` },
                { id: "domB", label: `A(z) ${tB} domináns a(z) ${tA} felett.` },
                { id: "inter", label: `Intermedier módon (hiányos dominancia).` },
                { id: "lethal", label: `A(z) ${tA} domináns, de homozigóta formában letális (halálos).` }
            ];
            return task;
        }

        // --- B TÍPUSÚ FELADATOK (Dihibrid arányok és valószínűségek) ---
        function generateTaskB(org) {
            let task = { type: 'B' };
            let t1 = org.traits[0]; let t2 = org.traits[1];
            let mode = randInt(0, 3); // 4 altípus

            if (mode === 0) { // Klasszikus 9:3:3:1
                task.text = `A(z) ${org.name} esetén a(z) ${t1.trait} és a(z) ${t2.trait} függetlenül öröklődik (két allél, domináns-recesszív).<br><br>Keresztezünk két egyedet: <span class="genotype">AaBb x AaBb</span>.<br>Milyen fenotípus-arány várható az utódoknál?`;
                task.expectedId = "9331";
                task.explanation = `Kettős heterozigóták (AaBb x AaBb) független öröklődése esetén a klasszikus Mendeli fenotípus hasadási arány <strong>9:3:3:1</strong>.`;
                task.options = [
                    { id: "9331", label: "9 : 3 : 3 : 1" }, { id: "1111", label: "1 : 1 : 1 : 1" },
                    { id: "31", label: "3 : 1" }, { id: "97", label: "9 : 7" }
                ];
            } else if (mode === 1) { // Tesztelő 1:1:1:1
                task.text = `A(z) ${org.name} esetén a(z) ${t1.trait} és a(z) ${t2.trait} függetlenül öröklődik.<br><br>Keresztezünk egy <span class="genotype">AaBb</span> egyedet egy <span class="genotype">aabb</span> egyeddel.<br>Milyen fenotípus-arány várható?`;
                task.expectedId = "1111";
                task.explanation = `Ez egy tesztelő keresztezés. A heterozigóta 4 féle ivarsejtet ad, a recesszív csak 1 félét, így mind a 4 fenotípus egyenlő eséllyel, <strong>1:1:1:1</strong> arányban jelenik meg.`;
                task.options = [
                    { id: "9331", label: "9 : 3 : 3 : 1" }, { id: "1111", label: "1 : 1 : 1 : 1" },
                    { id: "11", label: "1 : 1" }, { id: "121", label: "1 : 2 : 1" }
                ];
            } else if (mode === 2) { // Kiszámított valószínűség 1
                task.text = `Két <span class="genotype">AaBb</span> genotípusú ${org.name} egyedet keresztezünk (a tulajdonságok függetlenül öröklődnek).<br><br>Mekkora a valószínűsége annak, hogy egy születendő utód mindkét tulajdonságra nézve <strong>recesszív (<span class="genotype">aabb</span>)</strong> lesz?`;
                task.expectedId = "1_16";
                task.explanation = `Független öröklődésnél a valószínűségek szorzódnak. Az 'aa' esélye az Aa x Aa keresztezésből 1/4. A 'bb' esélye a Bb x Bb keresztezésből szintén 1/4. Tehát 1/4 &times; 1/4 = <strong>1/16</strong>.`;
                task.options = [
                    { id: "1_16", label: "1 / 16" }, { id: "3_16", label: "3 / 16" },
                    { id: "1_4", label: "1 / 4" }, { id: "1_8", label: "1 / 8" }
                ];
            } else { // Kiszámított valószínűség 2
                task.text = `Egy <span class="genotype">AaBb</span> és egy <span class="genotype">Aabb</span> genotípusú ${org.name} egyedet keresztezünk.<br><br>Mekkora az esélye annak, hogy az utód genotípusa <strong><span class="genotype">aabb</span></strong> lesz?`;
                task.expectedId = "1_8";
                task.explanation = `Nézzük génenként: az Aa x Aa keresztezésből az 'aa' esélye 1/4. A Bb x bb keresztezésből a 'bb' esélye 1/2. A kettő szorzata: 1/4 &times; 1/2 = <strong>1/8</strong>.`;
                task.options = [
                    { id: "1_16", label: "1 / 16" }, { id: "1_8", label: "1 / 8" },
                    { id: "1_4", label: "1 / 4" }, { id: "0", label: "0 (Lehetetlen)" }
                ];
            }
            return task;
        }

        // --- C TÍPUSÚ FELADATOK (Szülők genotípusának kikövetkeztetése) ---
        function generateTaskC(org, traitObj) {
            let task = { type: 'C' };
            let tD = traitObj.dom; let tR = traitObj.rec; let tI = traitObj.inter;
            let mode = randInt(0, 4); // 5 altípus
            let total = randInt(80, 150);

            if (mode === 0) { // Aa x Aa -> 3:1
                let dC = Math.round(total * 0.75); let rC = total - dC;
                task.text = `Egy keresztezésből <strong>${dC} db ${tD}</strong> (domináns) és <strong>${rC} db ${tR}</strong> (recesszív) utód született.<br><br>Mik lehettek a szülők?`;
                task.expectedId = "AaAa";
                task.explanation = `A 3:1 domináns-recesszív arány kizárólag két heterozigóta (<span class="genotype">Aa x Aa</span>) szülő esetén jön létre.`;
            } else if (mode === 1) { // Aa x aa -> 1:1
                let dC = Math.round(total * 0.5); let rC = total - dC;
                task.text = `Egy keresztezésből <strong>${dC} db ${tD}</strong> (domináns) és <strong>${rC} db ${tR}</strong> (recesszív) utód született.<br><br>Mik lehettek a szülők?`;
                task.expectedId = "Aaaa";
                task.explanation = `Az 1:1 arány egy tipikus tesztelő keresztezés eredménye, ahol az egyik szülő heterozigóta (<span class="genotype">Aa</span>), a másik homozigóta recesszív (<span class="genotype">aa</span>).`;
            } else if (mode === 2) { // AA x aa -> 100% Aa
                task.text = `Tudjuk, hogy az egyik szülő fenotípusa <strong>${tR}</strong> (recesszív) volt. Az összes utód (100%) mégis <strong>${tD}</strong> (domináns) fenotípusú lett.<br><br>Mi volt a másik szülő genotípusa?`;
                task.expectedId = "AA";
                task.explanation = `Ahhoz, hogy egy recesszív (aa) szülő mellett minden utód domináns legyen, a másik szülőnek kizárólag domináns allélt szabad örökítenie. Így a másik szülő csak homozigóta domináns (<span class="genotype">AA</span>) lehet.`;
                task.options = [
                    { id: "AA", label: "<span class='genotype'>AA</span> (homozigóta domináns)" },
                    { id: "Aa", label: "<span class='genotype'>Aa</span> (heterozigóta)" },
                    { id: "aa", label: "<span class='genotype'>aa</span> (homozigóta recesszív)" },
                    { id: "A", label: "Eldönthetetlen, lehet AA vagy Aa is." }
                ];
                return task; // Korai visszatérés a specifikus opciók miatt
            } else if (mode === 3) { // Aa x AA (Intermedier 1:1)
                let cI = Math.round(total * 0.5); let cD = total - cI;
                task.text = `A(z) ${traitObj.trait} <strong>intermedier</strong> módon öröklődik. Egy párosításból <strong>${cI} db ${tI}</strong> (kevert) és <strong>${cD} db ${tD}</strong> (egyik tiszta) fenotípusú utód született.<br><br>Mi volt a szülők genotípusa?`;
                task.expectedId = "AaAA";
                task.explanation = `Ahhoz, hogy tiszta (AA) és kevert (Aa) utódok 1:1 arányban szülessenek, az egyik szülőnek kevertnek (Aa), a másiknak tisztának (AA) kellett lennie.`;
            } else { // AA x aa (Intermedier 100%)
                task.text = `A(z) ${traitObj.trait} <strong>intermedier</strong> módon öröklődik. Két egyed párosításából az utódok <strong>100%-a ${tI}</strong> (kevert/átmeneti) fenotípusú lett.<br><br>Mik lehettek a szülők?`;
                task.expectedId = "AAaa";
                task.explanation = `Csak úgy lehet minden utód heterozigóta (Aa, kevert), ha az egyik szülő az egyik tiszta vonal (AA), a másik pedig a másik tiszta vonal (aa).`;
            }

            task.options = [
                { id: "AaAa", label: "<span class='genotype'>Aa x Aa</span>" },
                { id: "Aaaa", label: "<span class='genotype'>Aa x aa</span>" },
                { id: "AAaa", label: "<span class='genotype'>AA x aa</span>" },
                { id: "AaAA", label: "<span class='genotype'>Aa x AA</span>" }
            ];
            return task;
        }

        // --- VEZÉRLÉS ---
        function renderTask() {
            document.getElementById("feedbackBox").className = "feedback";
            document.getElementById("feedbackBox").style.display = "none";
            
            let org = organisms[randInt(0, organisms.length - 1)];
            // Trait shuffle hogy B feladatnál a 0. és 1. index mindig véletlen legyen
            shuffleArray(org.traits);
            let trait = org.traits[0]; 
            
            let taskType = randInt(0, 2);
            if (taskType === 0) currentTask = generateTaskA(org, trait);
            else if (taskType === 1) currentTask = generateTaskB(org);
            else currentTask = generateTaskC(org, trait);

            let typeNames = { 'A': 'Öröklődés menetének elemzése', 'B': 'Dihibrid öröklődés és valószínűségek', 'C': 'Szülői genotípusok felderítése' };
            document.getElementById('taskTitle').innerText = typeNames[currentTask.type];
            document.getElementById('taskText').innerHTML = currentTask.text;

            let optsHtml = "";
            shuffleArray(currentTask.options).forEach(opt => {
                optsHtml += `<label class="radio-label">
                    <input type="radio" name="mendel_answer" value="${opt.id}">
                    <span>${opt.label}</span>
                </label>`;
            });
            document.getElementById('optionsContainer').innerHTML = optsHtml;
        }

        document.getElementById('checkBtn').addEventListener('click', () => {
            if (!currentTask) return;
            
            let selected = document.querySelector('input[name="mendel_answer"]:checked');
            if (!selected) {
                alert("Kérlek válassz egy válaszlehetőséget!");
                return;
            }
            
            let isCorrect = (selected.value === currentTask.expectedId);
            let fbBox = document.getElementById("feedbackBox");

            fbBox.className = "feedback " + (isCorrect ? "success" : "error");
            let resultTitle = isCorrect ? "✅ Helyes válasz! A logika kikezdhetetlen." : "❌ Helytelen válasz. Nézzük a tényeket!";
            
            fbBox.innerHTML = `
                <h3>${resultTitle}</h3>
                <div class="explanation" ${isCorrect ? 'style="opacity:0.8"' : ''}>
                    <strong>Tanári magyarázat:</strong><br>${currentTask.explanation}
                </div>`;
            fbBox.style.display = "block";
        });

        document.getElementById('nextBtn').addEventListener('click', renderTask);

        window.addEventListener('DOMContentLoaded', renderTask);
    </script>
</body>
</html>
